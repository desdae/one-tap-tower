<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1f4f78" />
    <title>One Tap Tower</title>
  </head>
  <body>
    <div id="app">
      <canvas id="game-canvas" aria-label="One Tap Tower"></canvas>

      <div class="hud">
        <div class="hud__metric">
          <span class="hud__label">Score</span>
          <strong id="score-value">0</strong>
        </div>
        <div class="hud__metric hud__metric--right">
          <span class="hud__label">Best</span>
          <strong id="best-value">0</strong>
        </div>
      </div>

      <div class="topbar">
        <button id="sound-toggle" class="chip" type="button">Sound On</button>
      </div>

      <div id="toast" class="toast" aria-live="polite"></div>

      <section id="menu-screen" class="screen screen--active" aria-label="Start screen">
        <div class="screen__content">
          <p class="eyebrow">Portrait arcade stacking</p>
          <h1>One Tap Tower</h1>
          <p class="screen__text">
            Tap once to drop each block. Keep the overlap, cut the overhang, and climb as high
            as you can.
          </p>
          <div class="button-row">
            <button id="play-button" class="button button--primary" type="button">Play</button>
            <button id="menu-sound-button" class="button button--secondary" type="button">
              Sound On
            </button>
          </div>
          <div class="button-row">
            <button id="remove-ads-button" class="button button--ghost" type="button">
              Remove Ads
            </button>
          </div>
          <p id="menu-best" class="screen__meta">Best score: 0</p>
        </div>
      </section>

      <section id="gameover-screen" class="screen" aria-label="Game over screen">
        <div class="screen__content screen__content--compact">
          <p class="eyebrow">Run complete</p>
          <h2>Game Over</h2>
          <p id="gameover-score" class="score-line">Score: 0</p>
          <p id="gameover-best" class="screen__meta">Best score: 0</p>
          <div class="button-row button-row--stacked">
            <button id="continue-button" class="button button--secondary" type="button">
              Continue Once
            </button>
            <button id="restart-button" class="button button--primary" type="button">Restart</button>
            <button id="gameover-remove-ads" class="button button--ghost" type="button">
              Remove Ads
            </button>
          </div>
        </div>
      </section>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
